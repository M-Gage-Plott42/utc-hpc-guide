name: Bug Report
description: Report an error in docs, examples, or repository workflows.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: Briefly describe the issue.
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: File/Section
      description: Where did you see the issue?
      placeholder: docs/03-slurm-basics.md
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps to reproduce the problem.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: Describe the correct behavior.
    validations:
      required: false
  - type: checkboxes
    id: scrub
    attributes:
      label: Public Hygiene Check
      description: Confirm this issue report does not include sensitive details.
      options:
        - label: I removed credentials, private usernames, hostnames, account IDs, and allocation IDs.
          required: true
