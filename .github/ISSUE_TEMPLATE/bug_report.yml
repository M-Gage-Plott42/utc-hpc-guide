name: Bug Report
description: Report a reproducible issue in docs, examples, or repository checks.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed and where did it fail?
      placeholder: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Provide exact commands and steps.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS/shell/tool versions used.
      placeholder: |
        OS:
        Shell:
        SLURM version (if known):
        Relevant tooling:
    validations:
      required: false
